plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.visionocr'
version = '0.1.0'

android {
  namespace "expo.modules.visionocr"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // ML Kit 한국어 텍스트 인식 (온디바이스). 한국어 모델은 라틴 문자도 함께
  // 인식하므로 영어까지 커버된다. minSdk 21+ 필요(Expo SDK56 기본 충족).
  implementation 'com.google.mlkit:text-recognition-korean:16.0.1'
}
