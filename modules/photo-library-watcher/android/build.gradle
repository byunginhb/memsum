plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.photolibrarywatcher'
version = '0.1.0'

android {
  namespace "expo.modules.photolibrarywatcher"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // HeadlessJsTaskService 등 RN 클래스 컴파일 가시성(백그라운드 [저장] 처리용).
  // 버전 미명시: React Native Gradle 플러그인이 루트에서 로컬 RN 버전으로 강제 치환한다.
  compileOnly("com.facebook.react:react-android")
}
